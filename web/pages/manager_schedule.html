<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание - DentalTime</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/pages/manager_schedule.css">
</head>

<body data-page="manager-schedule">
    <header class="row">
        <nav class="offset-1 col-10 nav-container">
            <div class="logo">DentalTime</div>

            <div class="desktop-menu">
                <a class="top-menu-button" href="/manager/schedule">Расписание</a>
                <a class="top-menu-button" href="/manager/appointments">Записи</a>
                <a class="top-menu-button" href="/manager/team">Команда</a>
                <a class="top-menu-button" href="/manager/services">Услуги</a>
                <a class="top-menu-button" href="/login">Выход</a>
            </div>

            <button class="burger-menu-btn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="row page-container">
        
        <div class="offset-2 col-8">
            
            <div class="schedule-date-wrapper">
                <div class="schedule-date card-glass">
                    <button class="date-btn">&lt;</button>
                    <div class="date-current"><span></span></div>
                    <button class="date-btn">&gt;</button>
                </div>
            </div>
            <div class="schedule-board card-glass">
                <div class="schedule-grid" id="schedule-grid">
                    
                    <div class="time-label" style="grid-row: 1;">10:00</div>
                    <div class="grid-line" style="grid-row: 1;"></div>
                    
                    <div class="time-label" style="grid-row: 5;">11:00</div>
                    <div class="grid-line" style="grid-row: 5;"></div>
                    
                    <div class="time-label" style="grid-row: 9;">12:00</div>
                    <div class="grid-line" style="grid-row: 9;"></div>
                    
                    <div class="time-label" style="grid-row: 13;">13:00</div>
                    <div class="grid-line" style="grid-row: 13;"></div>
                    
                    <div class="time-label" style="grid-row: 17;">14:00</div>
                    <div class="grid-line" style="grid-row: 17;"></div>

                    <div class="time-label" style="grid-row: 21;">15:00</div>
                    <div class="grid-line" style="grid-row: 21;"></div>

                    <div class="time-label" style="grid-row: 25;">16:00</div>
                    <div class="grid-line" style="grid-row: 25;"></div>

                    <div class="time-label" style="grid-row: 29;">17:00</div>
                    <div class="grid-line" style="grid-row: 29;"></div>

                    <div class="time-label" style="grid-row: 33;">18:00</div>
                    <div class="grid-line" style="grid-row: 33;"></div>

                </div>
            </div>
        </div>

    </main>
<script type="module" src="./../scripts/pages/manager_schedule.js"></script>
</body>
</html>
