<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление командой - DentalTime</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/pages/manager_team.css">
</head>

<body data-page="manager-team">
    <header class="row">
        <nav class="offset-1 col-10 nav-container">
            <div class="logo">DentalTime</div>

            <div class="desktop-menu">
                <a class="top-menu-button" href="/manager/schedule">Расписание</a>
                <a class="top-menu-button" href="/manager/appointments">Записи</a>
                <a class="top-menu-button" href="/manager/team">Команда</a>
                <a class="top-menu-button" href="/manager/services">Услуги</a>
                <a class="top-menu-button" href="/login">Выход</a>
            </div>

            <button class="burger-menu-btn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="row page-container">
        <div class="offset-2 col-8">
            <div class="admin-header">
                <h1 class="page-title">Управление врачами</h1>
                <button class="btn btn-md btn-primary" id="add-doctor-btn">+ Добавить врача</button>
            </div>
            <div class="team-grid" id="manager-doctors-container"></div>

            <div class="admin-header managers-header">
                <h1 class="page-title">Менеджеры</h1>
            </div>

            <div class="card manager-create-card">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-input" id="manager-login" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="manager-password" autocomplete="new-password">
                </div>
                <button class="btn btn-primary btn-md" id="add-manager-btn">Добавить менеджера</button>
            </div>

            <div class="team-grid managers-grid" id="manager-users-container"></div>
        </div>
    </main>
<script type="module" src="./../scripts/pages/manager_team.js"></script>
</body>
</html>
