<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус записи - DentalTime</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/status.css">
</head>

<body data-page="status">
    <header class="row">
        <nav class="offset-1 col-10 nav-container">
            <div class="logo">DentalTime</div>

            <div class="desktop-menu">
                <a class="top-menu-button" href="/appointment">Онлайн-запись</a>
                <a class="top-menu-button" href="/team">Команда</a>
                <a class="top-menu-button" href="/services">Услуги</a>
                <a class="top-menu-button" href="/status">Статус заявки</a>
                <a class="top-menu-button" href="/login">Сотрудникам</a>
            </div>

            <button class="burger-menu-btn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="row page-container">
        <div class="offset-3 col-6 status-container">
            
            <h1 class="page-title">Узнать статус записи</h1>
            <div class="status-search-box">
                <input type="text" class="form-input search-input" placeholder="Введите номер записи (например: 123)">
                <button class="btn btn-primary btn-md">Проверить</button>
            </div>
            <div class="card status-card is-hidden" id="status-card"></div>

        </div>
    </main>
<script type="module" src="./../scripts/pages/status.js"></script>
