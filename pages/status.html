<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус записи - DentalTime</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/status.css">
</head>

<body data-page="status">
    <header class="row">
        <nav class="offset-1 col-10 nav-container">
            <div class="logo">DentalTime</div>

            <div class="desktop-menu">
                <a class="top-menu-button" href="appointment.html">Онлайн-запись</a>
                <a class="top-menu-button" href="team.html">Команда</a>
                <a class="top-menu-button" href="services.html">Услуги</a>
                <a class="top-menu-button" href="status.html">Статус заявки</a>
                <a class="top-menu-button" href="login.html">Сотрудникам</a>
            </div>

            <button class="burger-menu-btn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="row page-container">
        <!-- центрирование контента -->
        <div class="offset-3 col-6 status-container">
            
            <h1 class="page-title">Узнать статус записи</h1>

            <!-- блок поиска записи -->
            <div class="status-search-box">
                <input type="text" class="form-input search-input" placeholder="Введите номер записи (например: 123)">
                <button class="btn btn-primary btn-md">Проверить</button>
            </div>

            <!-- карточка найденной записи -->
            <div class="card status-card">
                <div class="status-header">
                    <span class="status-id">Запись №123</span>
                    <span class="badge badge-primary">Подтверждена</span>
                </div>
                
                <div class="status-body">
                    <div class="status-row">
                        <span class="status-label">Услуга</span>
                        <span class="status-value">Профессиональная гигиена</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Врач</span>
                        <span class="status-value">Анна Смирнова</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Дата и время</span>
                        <span class="status-value">15 мая 2026, 14:00</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Длительность</span>
                        <span class="status-value">60 мин</span>
                    </div>
                </div>

                <div class="status-actions">
                    <button class="btn btn-secondary btn-md">Перенести</button>
                    <button class="btn btn-outline btn-md">Отменить</button>
                </div>
            </div>

        </div>
    </main>
<script type="module" src="./../scripts/app.js"></script>
</body>
</html>
