<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - DentalTime</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <header class="row">
        <nav class="offset-1 col-10 nav-container">
            <div class="logo">DentalTime</div>

            <div class="desktop-menu">
                <a class="top-menu-button" href="appointment.html">Онлайн-запись</a>
                <a class="top-menu-button" href="team.html">Команда</a>
                <a class="top-menu-button" href="services.html">Услуги</a>
                <a class="top-menu-button" href="status.html">Статус заявки</a>
                <a class="top-menu-button" href="login.html">Сотрудникам</a>
            </div>

            <button class="burger-menu-btn" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="row page-container">
        <!-- Карточка входа занимает 4 колонки по центру (сдвиг на 4) -->
        <section class="offset-4 col-4 card-glass login-card">
            <h1 class="login-title">Вход для сотрудников</h1>
            
            <form action="#" method="POST" class="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Логин</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Введите ваш логин" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-md btn-full">Войти в систему</button>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
